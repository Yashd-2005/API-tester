<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>API Testing Tool</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>API Testing Tool</h1>

    <label>HTTP Method</label>

    <select id="method">
        <option>GET</option>
        <option>POST</option>
        <option>PUT</option>
        <option>DELETE</option>
    </select>

    <label>URL</label>

    <input
            type="text"
            id="url"
            placeholder="https://example.com/api">

    <label>Headers (JSON)</label>

    <textarea
            id="header"
            rows="5"
            placeholder='{"Content-Type":"application/json"}'></textarea>

    <label>Request Body</label>

    <textarea
            id="body"
            rows="8"
            placeholder='{"name":"Laptop"}'></textarea>

    <button onclick="sendRequest()">
        Send Request
    </button>

    <hr>

    <h3>Status</h3>

    <p id="status"></p>

    <h3>Response Time</h3>

    <p id="time"></p>

    <h3>Response Headers</h3>

    <pre id="responseHeaders"></pre>

    <h3>Response Body</h3>

    <pre id="responseBody"></pre>

</div>

<script src="script.js"></script>

</body>

</html>
